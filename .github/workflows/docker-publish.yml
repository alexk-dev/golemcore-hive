name: CI & Docker Publish

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Run backend tests
        run: ./mvnw test

      - name: Run frontend tests
        working-directory: ui
        run: npm run test

      - name: Run frontend build
        working-directory: ui
        run: npm run build

      - name: Package application
        run: ./mvnw -DskipTests package

  build-app-images:
    name: App (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Determine image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          APP_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          ARCH="${{ matrix.arch }}"

          echo "app-image=${APP_IMAGE}:${SHORT_SHA}-${ARCH}" >> "${GITHUB_OUTPUT}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "extra-tags=latest-${ARCH},${VERSION}-${ARCH}" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "extra-tags=latest-${ARCH}" >> "${GITHUB_OUTPUT}"
          else
            echo "extra-tags=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push app image (${{ matrix.arch }})
        env:
          EXTRA_TAGS: ${{ steps.tags.outputs.extra-tags }}
        run: |
          JIB_ARGS=(
            ./mvnw
            prepare-package
            jib:build
            -DskipTests
            -Djib.platform.arch=${{ matrix.arch }}
            -Djib.target.image=${{ steps.tags.outputs.app-image }}
            -Djib.to.auth.username=${{ github.actor }}
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}
          )

          if [[ -n "${EXTRA_TAGS}" ]]; then
            JIB_ARGS+=("-Djib.to.tags=${EXTRA_TAGS}")
          fi

          "${JIB_ARGS[@]}"

  create-manifest:
    name: Multiarch Manifest
    runs-on: ubuntu-latest
    needs: [build-app-images]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          docker manifest create "${IMAGE}:${SHORT_SHA}" \
            "${IMAGE}:${SHORT_SHA}-amd64" \
            "${IMAGE}:${SHORT_SHA}-arm64"
          docker manifest push "${IMAGE}:${SHORT_SHA}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"

            docker manifest create "${IMAGE}:${VERSION}" \
              "${IMAGE}:${VERSION}-amd64" \
              "${IMAGE}:${VERSION}-arm64"
            docker manifest push "${IMAGE}:${VERSION}"

            docker manifest create "${IMAGE}:latest" \
              "${IMAGE}:latest-amd64" \
              "${IMAGE}:latest-arm64"
            docker manifest push "${IMAGE}:latest"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker manifest create "${IMAGE}:latest" \
              "${IMAGE}:latest-amd64" \
              "${IMAGE}:latest-arm64"
            docker manifest push "${IMAGE}:latest"
          fi

      - name: Verify published manifest tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          verify_manifest() {
            local reference="$1"
            local raw

            raw="$(docker buildx imagetools inspect "${reference}" --raw)"

            if ! grep -Eq '"mediaType"[[:space:]]*:[[:space:]]*"(application/vnd.docker.distribution.manifest.list.v2\+json|application/vnd.oci.image.index.v1\+json)"' <<< "${raw}"; then
              echo "Expected a multi-arch manifest list for ${reference}, but found:"
              echo "${raw}"
              exit 1
            fi

            if ! grep -Eq '"architecture"[[:space:]]*:[[:space:]]*"amd64"' <<< "${raw}"; then
              echo "Missing linux/amd64 entry in ${reference}"
              echo "${raw}"
              exit 1
            fi

            if ! grep -Eq '"architecture"[[:space:]]*:[[:space:]]*"arm64"' <<< "${raw}"; then
              echo "Missing linux/arm64 entry in ${reference}"
              echo "${raw}"
              exit 1
            fi
          }

          verify_manifest "${IMAGE}:${SHORT_SHA}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            verify_manifest "${IMAGE}:${VERSION}"
            verify_manifest "${IMAGE}:latest"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            verify_manifest "${IMAGE}:latest"
          fi

      - name: Job Summary
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            PRIMARY_TAG="${VERSION}"
            TAGS="\`${VERSION}\`, \`latest\`, \`${SHORT_SHA}\`"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            PRIMARY_TAG="latest"
            TAGS="\`latest\`, \`${SHORT_SHA}\`"
          else
            PRIMARY_TAG="${SHORT_SHA}"
            TAGS="\`${SHORT_SHA}\`"
          fi

          echo "## Multiarch Docker Image Published" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Property | Value |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|----------|-------|" >> "${GITHUB_STEP_SUMMARY}"
          echo "| **Image** | \`${IMAGE}:${PRIMARY_TAG}\` |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| **Tags** | ${TAGS} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| **Architectures** | \`amd64\`, \`arm64\` |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| **Base image** | \`eclipse-temurin:25-jre-alpine\` |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "### Pull command" >> "${GITHUB_STEP_SUMMARY}"
          echo "\`\`\`bash" >> "${GITHUB_STEP_SUMMARY}"
          echo "docker pull ${IMAGE}:${PRIMARY_TAG}" >> "${GITHUB_STEP_SUMMARY}"
          echo "\`\`\`" >> "${GITHUB_STEP_SUMMARY}"
