spring:
  application:
    name: golemcore-hive

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

hive:
  storage:
    base-path: ./data/hive
  security:
    cors-allowed-origins:
      - http://localhost:5173
    jwt:
      issuer: golemcore-hive
      audience: golemcore-hive-ui
      golem-audience: golemcore-hive-golem
      secret: ${HIVE_JWT_SECRET:}
      access-expiration-minutes: 30
      refresh-expiration-days: 7
      golem-access-expiration-minutes: 15
      golem-refresh-expiration-days: 30
    cookie:
      refresh-name: hive_refresh_token
      secure: false
      same-site: Lax
      path: /api/v1/auth
  fleet:
    enrollment-token-ttl-minutes: 30
    heartbeat-interval-seconds: 30
    degraded-after-misses: 2
    offline-after-misses: 4
    presence-evaluation-interval-seconds: 15
    public-base-url: http://localhost:8080
    control-channel-url: /ws/golems/control
  governance:
    approvals:
      high-cost-threshold-micros: 5000000
    notifications:
      approval-requested: true
      blocker-raised: true
      golem-offline: true
      command-failed: true
    retention:
      approvals-days: 30
      audit-days: 90
      notifications-days: 30
  deployment:
    production-mode: false
